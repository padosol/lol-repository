spring:
  config:
    import:
      - classpath:application-api.yml
      - classpath:application-persistence.yml
      - classpath:application-redis.yml
      - classpath:application-rabbitmq.yml
      - classpath:application-riot.yml
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
  lifecycle:
    timeout-per-shutdown-phase: 30s
  threads:
    virtual:
      enabled: ${LOL_VT_ENABLED:true}

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_EXPOSURE_INCLUDE:health,info,metrics,prometheus,threaddump}
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

lol:
  vt:
    executors:
      enabled: ${LOL_VT_EXECUTORS_ENABLED:${LOL_VT_ENABLED:true}}
